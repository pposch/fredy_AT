# Production deployment for fredy-AT (Austrian fork of Fredy)
# Designed for use behind nginx-proxy-manager on a 'web' Docker network.
#
# Prerequisites:
#   docker network create web
#   mkdir -p ./fredy/conf ./fredy/db
#   cp <your-config.json> ./fredy/conf/config.json
#
# Usage:
#   docker compose pull && docker compose up -d
#
# Optional: create a .env file in this directory to override variables:
#   PROXY_URL=http://user:pass@host:port

services:
  fredy:
    container_name: fredy
    image: ghcr.io/pposch/fredy-at:latest
    environment:
      - NODE_ENV=production
      - PROXY_URL=${PROXY_URL:-}
    volumes:
      - ./fredy/conf:/conf
      - ./fredy/db:/db
    ports:
      - "9998:9998"
    networks:
      - web
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1536M
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "--max-time", "5", "http://localhost:9998/"]
      interval: 120s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  web:
    external: true
